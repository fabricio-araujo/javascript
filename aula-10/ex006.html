<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Elementos DOM</title>
    <style>
        div#area {
            font: normal 15pt arial;
            background-color: rgb(3, 117, 117);
            color: aliceblue;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<!-- Buscar page MDN sobre Event Reference-->
<body>
    <div id="area"><!--onclick="clicar()" onmouseenter='entrar()' onmouseout="sair()"-->
        Intereja...
    </div>

    <script>

        var a = window.document.getElementById('area')
        //Alternativa para não declarar eventos no HTML: Listeners
        a.addEventListener('click', clicar)
        a.addEventListener('mouseenter', entrar)
        a.addEventListener('mouseout', sair)

        function clicar() {
            a.innerText = 'Clicou!'
            a.style.background = 'red'
        }

        function entrar() {
            a.innerText = 'Entrou!'
        }

        function sair() {
            a.innerText = 'Saiu!'
        }
    </script>
</body>
</html>
