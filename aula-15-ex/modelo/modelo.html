<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Contador de contos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Contador de contos</h1>
    </header>
    <section>
        <div>
            <p>Digite o primeiro valor
                <input type="number" name="valorum" id="valorum">
            </p>
            <p>Digite o segundo valor
                <input type="number" name="valordois" id="valordois">
            </p>
            <p>Digite um intervalo
                <input type="number" name="valortres" id="valortres">
            </p>
        </div>
        <p>
            <input type="button" value="contador" onclick="contador()">
        </p>
        <div id="resultado">
            Preencha os dados acima para ver o resultado
        </div>
    </section>
    <footer>
        <p>&copy; Shablau Inc.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
